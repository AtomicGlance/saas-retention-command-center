name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project
        run: python -m pip install -e ".[dev]"
      - name: Generate reviewed outputs
        run: python -m saas_retention --project-root .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Reconcile headline MRR
        run: python scripts/spot_check.py
